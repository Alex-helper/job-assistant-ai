services:
  - type: web
    name: job-hunt-assistant
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PUBLIC_MODE
        value: "1"
      - key: ENABLE_RUN_CODE
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: MODEL_NAME
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
